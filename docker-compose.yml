services:
  db:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: example
      MYSQL_DATABASE: tarjeta_joven
      MYSQL_USER: usuario
      MYSQL_PASSWORD: password
    ports:
      - "${DB_HOST_PORT:-3310}:3306"
    volumes:
      - db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    image: node:22-bookworm
    env_file:
      - ./.env
    ports:
      - "${API_HOST_PORT:-8081}:8080"
    depends_on:
      db:
        condition: service_healthy
    working_dir: /app
    command: sh -lc "npm install && npm run db:ensure && npm run seed:if-needed && npm start"
    environment:
      NODE_ENV: development
      PORT: 8080
      DB_HOST: db
      DB_PORT: 3306
      DB_USER: usuario
      DB_PASSWORD: password
      DB_NAME: tarjeta_joven
      AUTH0_DOMAIN: http://host.docker.internal:9091/auth0
      AUTH0_CLIENT_ID: postman-local-client
      SYS_IPJ_PUSH_URL: http://host.docker.internal/api/v1/integrations/api-tj/staging/accept
    volumes:
      - ./:/app
      - api_node_modules:/app/node_modules

volumes:
  db_data:
  api_node_modules:
