[build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile"

[deploy]
preDeployCommand = "npm run railway:predeploy"
startCommand = 'mkdir -p /app/secrets && printf "%b" "$API_TJ_PRIVATE_KEY_PEM" > /app/secrets/api_tj_private.pem && npm start'
healthcheckPath = "/health"
healthcheckTimeout = 120
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 10
